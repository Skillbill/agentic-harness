name: Release

# Trigger su tag annotato vX.Y.Z. La Action estrae la sezione corrispondente
# da CHANGELOG.md via awk POSIX (zero-deps) e crea la GitHub Release usando
# `gh` CLI, preinstallato sui runner GitHub-hosted. Vedi R-0003 in
# REQUIREMENTS.md per la rationale.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: notes
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"

          # Estrae il blocco fra `## [X.Y.Z]` (escluso l'header) e la successiva
          # sezione `## [...]` o il primo reference-link `[X.Y.Z]: ...` in coda.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]"                   { capture = 1; next }
            capture && (/^## \[/ || /^\[[^]]+\]:/)     { exit }
            capture                                    { print }
          ' CHANGELOG.md > .release-notes.md

          if [ ! -s .release-notes.md ]; then
            echo "::error::No changelog section found for version ${VERSION} in CHANGELOG.md"
            exit 1
          fi

          {
            echo "## ${TAG}"
            echo
            cat .release-notes.md
          } > .release-notes.final.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes-file .release-notes.final.md \
            --verify-tag
